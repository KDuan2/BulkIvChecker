<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP IV Comparison Tool</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">Loading game data...</div>

<div class="app-container">
    <!-- Header -->
    <div class="app-header">
        <h1>PvP IV Comparison Tool</h1>
        <button id="btnClearSession" class="btn-danger">Clear Session</button>
    </div>

    <!-- Controls: Species, Form -->
    <div class="controls-section">
        <div class="controls-row">
            <label>Species</label>
            <div class="species-search-wrapper">
                <input type="text" id="speciesSearch" placeholder="Search Pokemon..." autocomplete="off">
                <div class="search-dropdown" id="speciesDropdown"></div>
            </div>
            <label>Form</label>
            <select id="formSelect">
                <option value="normal">Normal</option>
                <option value="shadow">Shadow</option>
                <option value="purified">Purified</option>
            </select>
        </div>

        <!-- League, Best Buddy -->
        <div class="controls-row">
            <label>League</label>
            <div class="league-tabs">
                <button class="league-btn active" data-league="1500">Great</button>
                <button class="league-btn" data-league="2500">Ultra</button>
                <button class="league-btn" data-league="10000">Master</button>
            </div>
            <div class="toggle-wrapper">
                <label>Best Buddy</label>
                <div class="toggle" id="bestBuddyToggle" title="Level 51 cap"></div>
            </div>
        </div>

        <!-- Moveset Override -->
        <div class="controls-row" id="movesetRow">
            <label>Moveset</label>
            <select id="fastMoveSelect"><option value="">Auto</option></select>
            <select id="chargedMove1Select"><option value="">Auto</option></select>
            <select id="chargedMove2Select"><option value="">Auto</option></select>
            <button id="btnApplyMoves">Apply Moves</button>
            <button id="btnResetMoves">Reset to Auto</button>
        </div>
    </div>

    <!-- Mode switcher -->
    <div class="mode-tabs-bar">
        <label>Mode</label>
        <div class="league-tabs">
            <button class="mode-btn active" data-mode="compare">IV Comparison</button>
            <button class="mode-btn" data-mode="bulk">Bulk Matchups</button>
        </div>
        <span class="mode-hint" id="modeHint"></span>
    </div>

    <!-- Candidates -->
    <div class="candidates-section" id="candidatesSection">
        <h2>Candidates</h2>
        <table class="candidate-table">
            <thead>
                <tr>
                    <th style="width:24px"></th>
                    <th style="width:30px">Ref</th>
                    <th style="width:30px"></th>
                    <th>Nickname</th>
                    <th style="width:78px">ATK</th>
                    <th style="width:78px">DEF</th>
                    <th style="width:78px">STA</th>
                    <th style="width:90px">Form</th>
                    <th style="width:185px">CP / Level / Rank</th>
                    <th style="width:60px">Actions</th>
                </tr>
            </thead>
            <tbody id="candidateBody"></tbody>
        </table>
        <button id="btnAddRow" style="margin-top:8px">+ Add Row</button>
        <button id="btnRunSim" style="margin-top:8px; margin-left:8px; font-weight:600">Run Simulation</button>
        <button id="btnResetCandidateExclusions" style="margin-top:8px; margin-left:8px">Reset Exclusions</button>
        <button id="btnClearCandidates" style="margin-top:8px; margin-left:8px" class="btn-danger">Clear Candidates</button>
    </div>

    <!-- Threat List -->
    <div class="threat-section">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
            <h2>Threat List</h2>
            <div style="display:flex; gap:8px; align-items:center">
                <div class="species-search-wrapper" style="max-width:200px">
                    <input type="text" id="threatSearch" placeholder="Add threat..." autocomplete="off">
                    <div class="search-dropdown" id="threatDropdown"></div>
                </div>
                <select id="metaSelect"></select>
                <button id="btnLoadMeta">Load Meta</button>
            </div>
        </div>
        <div class="threat-list" id="threatList"></div>
    </div>

    <!-- Results Matrix -->
    <div class="matrix-section" id="matrixSection" style="display:none">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px">
            <h2>Matchups</h2>
            <div style="display:flex; align-items:center; gap:12px">
                <div class="shield-legend" id="shieldFilter" title="Toggle which shield scenarios the matrix and differences consider"></div>
                <div class="matrix-tabs">
                    <button class="active">Battle Rating</button>
                    <button id="btnExportCSV">Export All CSV</button>
                    <button id="btnExportCSV0v0">Export 0v0</button>
                    <button id="btnExportCSV1v1">Export 1v1</button>
                </div>
            </div>
        </div>
        <div id="matrixScroll" style="overflow-x:auto">
            <table class="matrix-table" id="matrixTable">
                <thead id="matrixHead"></thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Differences -->
    <div class="differences-section" id="diffSection" style="display:none">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
            <h2>Differences <span id="diffRefLabel" style="font-weight:400; color:var(--text-dim); font-size:0.85rem">(vs Candidate 1)</span></h2>
            <div style="display:flex; align-items:center; gap:12px">
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer" title="Click threats in the Threat List to mark as priority">
                    <input type="checkbox" id="diffPriorityOnly"> Priority only
                </label>
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer">
                    <input type="checkbox" id="diffHideExcluded"> Hide excluded
                </label>
                <button id="btnResetExclusions" style="font-size:0.75rem">Reset Exclusions</button>
                <button id="btnRunSimDiff" style="font-weight:600">Run Simulation</button>
            </div>
        </div>
        <div id="diffContent"></div>
    </div>

    <!-- Bulk Matchups (one mon vs the meta, all shields) -->
    <div class="bulk-section" id="bulkSection" style="display:none">
        <div class="bulk-header">
            <h2>Bulk Matchups <span class="bulk-sub" id="bulkMonLabel"></span></h2>
            <div class="bulk-controls">
                <span class="bulk-iv-group">
                    <label>IVs</label>
                    <input type="number" id="bulkAtk" min="0" max="15" value="15" title="Attack IV" class="iv-input">
                    <input type="number" id="bulkDef" min="0" max="15" value="15" title="Defense IV" class="iv-input">
                    <input type="number" id="bulkSta" min="0" max="15" value="15" title="Stamina IV" class="iv-input">
                </span>
                <span class="bulk-sort-group">
                    <label>Sort</label>
                    <button class="bulk-sort-btn active" data-sort="overall">Overall</button>
                    <button class="bulk-sort-btn" data-sort="1v1">1v1</button>
                    <button class="bulk-sort-btn" data-sort="name">A&ndash;Z</button>
                </span>
                <button id="btnRunBulk" style="font-weight:600">Run</button>
            </div>
        </div>
        <div id="bulkContent"></div>
    </div>

    <div class="status-bar" id="statusBar"></div>
</div>

<!-- Game data -->
<script src="data/gamemaster-data.js"></script>
<script src="data/meta-groups.js"></script>
<script src="data/ranking-movesets.js"></script>
<script src="data/archived-cups.js"></script>
<script src="data/ranking-scores.js"></script>

<!-- PvPoke engine (verbatim from https://github.com/pvpoke/pvpoke, MIT License) -->
<script src="js/pvpoke/GameMasterShim.js"></script>
<script src="js/pvpoke/DamageCalculator.js"></script>
<script src="js/pvpoke/DecisionOption.js"></script>
<script src="js/pvpoke/TimelineAction.js"></script>
<script src="js/pvpoke/TimelineEvent.js"></script>
<script src="js/pvpoke/Pokemon.js"></script>
<script src="js/pvpoke/ActionLogic.js"></script>
<script src="js/pvpoke/Battle.js"></script>

<!-- App layer -->
<script src="js/types.js"></script>
<script src="js/gamemaster.js"></script>
<script src="js/pokemon.js"></script>
<script src="js/battle.js"></script>
<script src="js/app.js"></script>


</body>
</html>
